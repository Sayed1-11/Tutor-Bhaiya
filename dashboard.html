<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TutorBhaiya</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#090d16',
                        light: '#F9FAFB',
                        primary: '#8B5CF6',
                        secondary: '#10B981',
                        accent1: '#F59E0B',
                        accent2: '#38BDF8'
                    }
                }
            }
        }
    </script>
</head>
<body class="font-sans antialiased text-gray-800 bg-gray-50 flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-dark border-r border-gray-800 text-white flex flex-col hidden md:flex">
        <div class="h-20 flex items-center px-6 border-b border-gray-800">
            <a href="index.html" class="flex items-center gap-2">
                <img src="assets/logo.png" alt="TutorBhaiya" class="h-8 w-auto object-contain">
                <span class="font-bold text-lg tracking-tight">TutorBhaiya</span>
            </a>
        </div>
        <div class="flex-1 overflow-y-auto py-6 px-4 space-y-2">
            <a href="#" class="flex items-center gap-3 px-4 py-3 bg-white/10 rounded-xl text-primary font-medium">
                <i class="ph ph-squares-four text-xl"></i> Dashboard
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 hover:bg-white/5 rounded-xl text-gray-400 hover:text-white transition-colors">
                <i class="ph ph-play-circle text-xl"></i> My Courses
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 hover:bg-white/5 rounded-xl text-gray-400 hover:text-white transition-colors">
                <i class="ph ph-exam text-xl"></i> Exams & Quizzes
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 hover:bg-white/5 rounded-xl text-gray-400 hover:text-white transition-colors">
                <i class="ph ph-certificate text-xl"></i> Certificates
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 hover:bg-white/5 rounded-xl text-gray-400 hover:text-white transition-colors">
                <i class="ph ph-gear text-xl"></i> Settings
            </a>
        </div>
        <div class="p-4 border-t border-gray-800">
            <a href="index.html" class="flex items-center gap-3 px-4 py-3 hover:bg-red-500/10 rounded-xl text-gray-400 hover:text-red-400 transition-colors">
                <i class="ph ph-sign-out text-xl"></i> Logout
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        
        <!-- Top Header -->
        <header class="h-20 bg-white border-b border-gray-200 flex items-center justify-between px-8 shrink-0">
            <div class="flex items-center gap-4">
                <button class="md:hidden text-gray-500 hover:text-gray-900"><i class="ph ph-list text-2xl"></i></button>
                <h2 class="text-xl font-bold text-gray-900">Welcome back, Student!</h2>
            </div>
            <div class="flex items-center gap-4">
                <button class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-600 hover:bg-gray-200">
                    <i class="ph ph-bell text-xl"></i>
                </button>
                <div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white font-bold cursor-pointer shadow-md">
                    S
                </div>
            </div>
        </header>

        <!-- Dashboard Content -->
        <div class="flex-1 overflow-y-auto p-8">
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <!-- Stat Card 1 -->
                <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm flex items-center gap-4">
                    <div class="w-14 h-14 rounded-xl bg-blue-50 flex items-center justify-center text-blue-500 text-2xl">
                        <i class="ph-fill ph-book-open"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500 font-medium">Active Courses</p>
                        <h3 class="text-2xl font-bold text-gray-900">3</h3>
                    </div>
                </div>
                <!-- Stat Card 2 -->
                <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm flex items-center gap-4">
                    <div class="w-14 h-14 rounded-xl bg-emerald-50 flex items-center justify-center text-emerald-500 text-2xl">
                        <i class="ph-fill ph-check-circle"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500 font-medium">Completed Classes</p>
                        <h3 class="text-2xl font-bold text-gray-900">24</h3>
                    </div>
                </div>
                <!-- Stat Card 3 -->
                <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm flex items-center gap-4">
                    <div class="w-14 h-14 rounded-xl bg-amber-50 flex items-center justify-center text-amber-500 text-2xl">
                        <i class="ph-fill ph-trophy"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500 font-medium">Average Score</p>
                        <h3 class="text-2xl font-bold text-gray-900">88%</h3>
                    </div>
                </div>
            </div>

            <h3 class="text-lg font-bold text-gray-900 mb-4">Continue Learning</h3>
            <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 flex flex-col md:flex-row items-center gap-6">
                <img src="assets/course1.jpg" class="w-full md:w-48 h-32 object-cover rounded-xl" alt="Course">
                <div class="flex-1">
                    <span class="text-xs font-bold text-primary bg-primary/10 px-2 py-1 rounded-md mb-2 inline-block">SSC BATCH</span>
                    <h4 class="text-xl font-bold text-gray-900 mb-2">Higher Math Masterclass</h4>
                    <div class="w-full bg-gray-100 rounded-full h-2.5 mb-2">
                        <div class="bg-primary h-2.5 rounded-full" style="width: 45%"></div>
                    </div>
                    <p class="text-sm text-gray-500">45% Completed • Next: Chapter 4</p>
                </div>
                <button class="bg-gray-900 text-white px-6 py-3 rounded-xl font-semibold hover:bg-primary transition-colors whitespace-nowrap">
                    Resume Class
                </button>
            </div>

        </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
