<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - TutorBhaiya</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#090d16',
                        light: '#F9FAFB',
                        primary: '#8B5CF6',
                        secondary: '#10B981',
                        accent1: '#F59E0B',
                        accent2: '#38BDF8'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    backgroundImage: {
                        'star-pattern': "radial-gradient(rgba(255, 255, 255, 0.15) 1px, transparent 1px)",
                    },
                    backgroundSize: {
                        'star-size': '20px 20px'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="font-sans antialiased text-gray-800 bg-dark selection:bg-primary selection:text-white bg-star-pattern bg-star-size min-h-screen flex items-center justify-center relative overflow-hidden">
    
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/20 blur-[100px] rounded-full pointer-events-none"></div>

    <div class="relative z-10 w-full max-w-md p-8 bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl shadow-2xl my-8">
        <div class="text-center mb-8">
            <a href="index.html" class="inline-flex items-center gap-2 mb-6 cursor-pointer">
                <img src="assets/logo.png" alt="TutorBhaiya" class="h-10 w-auto object-contain">
                <span class="font-bold text-2xl text-white tracking-tight">TutorBhaiya</span>
            </a>
            <h2 class="text-2xl font-bold text-white mb-2">Create Your Account</h2>
            <p class="text-gray-400 text-sm">Join over 50,000+ active learners today!</p>
        </div>

        <div id="error-message" class="hidden mb-4 p-3 bg-red-500/20 border border-red-500/50 rounded-xl text-red-200 text-sm text-center"></div>

        <form id="signup-form" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Full Name</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                        <i class="ph ph-user"></i>
                    </div>
                    <input type="text" id="fullname" class="w-full pl-10 pr-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent text-white placeholder-gray-500 outline-none transition-all" placeholder="John Doe" required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Email Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                        <i class="ph ph-envelope"></i>
                    </div>
                    <input type="email" id="email" class="w-full pl-10 pr-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent text-white placeholder-gray-500 outline-none transition-all" placeholder="you@example.com" required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                        <i class="ph ph-lock"></i>
                    </div>
                    <input type="password" id="password" class="w-full pl-10 pr-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent text-white placeholder-gray-500 outline-none transition-all" placeholder="••••••••" required>
                </div>
            </div>

            <div class="flex items-center">
                <input id="agree-terms" type="checkbox" class="h-4 w-4 text-primary focus:ring-primary border-white/10 rounded bg-white/5" required>
                <label for="agree-terms" class="ml-2 block text-sm text-gray-300">
                    I agree to the <a href="#" class="text-primary hover:text-violet-400 transition-colors font-medium">Terms</a> and <a href="#" class="text-primary hover:text-violet-400 transition-colors font-medium">Privacy Policy</a>
                </label>
            </div>

            <button type="submit" class="w-full bg-secondary hover:bg-emerald-600 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-secondary/30 hover:shadow-secondary/50 flex items-center justify-center gap-2">
                Sign Up <i class="ph ph-arrow-right"></i>
            </button>
        </form>

        <p class="mt-8 text-center text-sm text-gray-400">
            Already have an account? <a href="login.html" class="font-bold text-white hover:text-primary transition-colors">Login</a>
        </p>
    </div>

    <script src="script.js"></script>
    <script>
        const API_BASE = 'http://127.0.0.1:8000/api';

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            errorDiv.classList.add('hidden');

            try {
                // Get CSRF Token
                const csrfRes = await fetch(`${API_BASE}/csrf/`);
                const { csrfToken } = await csrfRes.json();

                // Register request
                const res = await fetch(`${API_BASE}/auth/register/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken
                    },
                    body: JSON.stringify({ full_name: fullName, email, password }),
                    credentials: 'include'
                });

                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'dashboard.html';
                } else {
                    // Check for validation errors on password or email
                    let errors = [];
                    for (const field in data) {
                        if (Array.isArray(data[field])) {
                            errors.push(`${field}: ${data[field].join(' ')}`);
                        } else {
                            errors.push(data[field]);
                        }
                    }
                    errorDiv.innerHTML = errors.join('<br>') || 'Registration failed. Please check inputs.';
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
                errorDiv.textContent = 'Server connection error. Please try again.';
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
